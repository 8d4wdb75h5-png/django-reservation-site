<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>予約編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h1 class="mb-4">予約編集</h1>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">氏名</label>
            <input type="text" name="name" class="form-control" value="{{ reservation.name }}">
        </div>

        <div class="mb-3">
            <label class="form-label">電話番号</label>
            <input type="text" name="phone" class="form-control" value="{{ reservation.phone }}">
        </div>

        <div class="mb-3">
            <label class="form-label">人数</label>
            <input type="number" name="people" class="form-control" value="{{ reservation.people }}">
        </div>

        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'reservations:reservation_list' %}" class="btn btn-secondary">戻る</a>
    </form>

</body>
</html>
